apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: carboncoach
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    spec:
      containers:
        - image: gcr.io/carbon-coach-499117/carboncoach:latest
          resources:
            limits:
              memory: 1Gi
              cpu: 1000m
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "file:/app/prisma/carboncoach.db"
            - name: NEXT_PUBLIC_APP_URL
              value: "https://carboncoach-1033616809892.us-central1.run.app"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
