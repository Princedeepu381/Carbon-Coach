steps:
  # Build Docker image with latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carboncoach:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/carboncoach:$BUILD_ID'
      - '.'
  
  # Push both tags to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/carboncoach:latest']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/carboncoach:$BUILD_ID']

images:
  - 'gcr.io/$PROJECT_ID/carboncoach:latest'
  - 'gcr.io/$PROJECT_ID/carboncoach:$BUILD_ID'

options:
  machineType: 'N1_HIGHCPU_8'
timeout: '1200s'
